<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | DataEntry Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">DE</div>
      <div>
        <div class="brand-title">DataEntry Platform</div>
        <div class="brand-sub">Operations workspace</div>
      </div>
    </div>
    <nav class="nav flex-column gap-1">
      {% for item in nav %}
      <a class="nav-link {% if item.active %}active{% endif %}" href="{{ item.url }}"><i class="bi {{ item.icon }}"></i><span>{{ item.name }}</span></a>
      {% endfor %}
    </nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1>{{ page_title }}</h1>
        <p>Collect, validate, approve, and export operational data at scale.</p>
      </div>
      <div class="top-actions">
        <a class="btn btn-primary" href="/records">New Record</a>
        <a class="btn btn-outline-light" href="/login">Login</a>
      </div>
    </header>
    {% block content %}{% endblock %}
  </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
