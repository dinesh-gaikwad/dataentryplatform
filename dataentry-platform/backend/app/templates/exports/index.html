{% extends 'base.html' %}
{% block content %}
<section class='panel'>
  <div class='section-head'><div><h2>Exports</h2><p>Download ready report packages.</p></div></div>
  <div class='table-responsive'>
    <table class='table table-hover align-middle'>
      <thead><tr><th>Name</th><th>Format</th><th>Status</th></tr></thead>
      <tbody>
        {% for e in exports %}
        <tr><td>{{ e.name }}</td><td>{{ e.format }}</td><td><span class='badge-soft success'>{{ e.status }}</span></td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
