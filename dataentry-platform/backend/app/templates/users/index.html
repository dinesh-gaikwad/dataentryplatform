{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Users</h2>
  <div class="table-responsive mt-3">
    <table class="table table-dark table-hover align-middle">
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
      <tbody>
        {% for u in users %}
        <tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.status }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
