
{% extends 'base.html' %}
{% block content %}
<div class="content-grid">
  <section class="hero-card">
    <div>
      <h2 class="hero-title">User Management</h2>
      <p class="hero-sub">Accounts, roles, access control, and profile dashboards in one place.</p>
    </div>
    <div class="helper-row">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openUserModal()">Add User</button>
    </div>
  </section>
  <section class="panel">
    <form class="searchbar mb-3" method="get">
      <i class="bi bi-search"></i>
      <input name="q" value="{{ q }}" placeholder="Search users...">
    </form>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          {% for u in users %}
          <tr>
            <td><a href="/users/{{ u.id }}/profile">{{ u.full_name }}</a></td>
            <td>{{ u.email }}</td>
            <td><span class="badge-soft info">{{ u.role }}</span></td>
            <td><span class="badge-soft success">{{ u.status }}</span></td>
            <td>
              <button class="btn btn-sm btn-outline-light"
                data-bs-toggle="modal"
                data-bs-target="#userModal"
                onclick='openUserModal({{ u|tojson }})'>Edit</button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </section>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-light border border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="userModalTitle">New User</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="userForm" class="row g-3 p-3" method="post">
        <input type="hidden" id="user_id" name="user_id">
        <div class="col-md-6"><input class="form-control" id="full_name" name="full_name" placeholder="Full name" required></div>
        <div class="col-md-6"><input class="form-control" id="user_email" name="email" placeholder="Email" required></div>
        <div class="col-md-6">
          <select class="form-control" id="role" name="role">
            <option value="user">user</option><option value="manager">manager</option><option value="admin">admin</option>
          </select>
        </div>
        <div class="col-md-6">
          <select class="form-control" id="user_status" name="status">
            <option value="active">active</option><option value="inactive">inactive</option>
          </select>
        </div>
        <div class="col-12 d-flex justify-content-between">
          <button type="button" class="btn btn-outline-danger d-none" id="userDeleteBtn">Delete</button>
          <div class="ms-auto d-flex gap-2">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="userSaveBtn">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
